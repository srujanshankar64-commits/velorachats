    <script>
function initChatNotifications(){if(!("Notification"in window))return;if(Notification.permission!=="granted"&&Notification.permission!=="denied"){Notification.requestPermission();}}
function playChatAlert(s,t){var a=new Audio('/notify.mp3');a.volume=1.0;a.play().catch(function(){});if(window.Notification&&Notification.permission==="granted"){try{new Notification("New message from "+(s||'Someone'),{body:t||"Sent a message",icon:'/favicon.svg',tag:'shhchats-message',renotify:true});}catch(e){}}}
window.playChatAlert=playChatAlert;
document.addEventListener('click',function unlock(){var a=new Audio('/notify.mp3');a.volume=0;a.play().then(function(){a.pause();a.currentTime=0;}).catch(function(){});document.removeEventListener('click',unlock);},{once:true});
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",initChatNotifications);}else{initChatNotifications();}
